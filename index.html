<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jadwal Dosen BINGPRO</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jadwal BINGPRO">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0f1a;min-height:100vh;color:#e2e8f0}

/* HEADER */
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:20px 16px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.header h1{font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:2px}
.header p{font-size:0.72rem;color:#93c5fd}
.badge-row{display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,0.15);padding:3px 10px;border-radius:20px;font-size:0.65rem;color:#dbeafe}

/* SEARCH */
.search-box{padding:12px 16px;position:sticky;top:88px;z-index:99;background:#0a0f1a}
.search-input{width:100%;padding:12px 16px 12px 44px;border-radius:12px;border:1px solid #1e293b;background:#1e293b;color:#e2e8f0;font-size:0.9rem;font-family:inherit;outline:none;transition:0.2s}
.search-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:0.5}
.search-box{position:relative}

/* FILTERS */
.filters{padding:0 16px 8px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:0.72rem;font-family:inherit;cursor:pointer;white-space:nowrap;transition:0.2s}
.filter-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff;font-weight:600}
.filter-btn:hover{border-color:#3b82f6;color:#e2e8f0}

/* STATS */
.stats{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap}
.stat{background:#1e293b;border-radius:10px;padding:8px 12px;flex:1;min-width:100px;text-align:center}
.stat-num{font-size:1.2rem;font-weight:800;color:#60a5fa}
.stat-label{font-size:0.6rem;color:#64748b;margin-top:2px}

/* CARDS */
.cards{padding:8px 16px 24px}
.card{background:#1e293b;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #334155;transition:0.2s}
.card:hover{border-color:#3b82f6;transform:translateY(-1px)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-mk{font-size:0.95rem;font-weight:700;color:#f1f5f9}
.card-sks{background:#3b82f6;color:#fff;padding:2px 8px;border-radius:8px;font-size:0.65rem;font-weight:700}
.card-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.card-tag{background:#0f172a;padding:4px 10px;border-radius:8px;font-size:0.7rem;color:#94a3b8;display:flex;align-items:center;gap:4px}
.card-tag .icon{font-size:0.8rem}
.card-dosen{font-size:0.78rem;font-weight:600;color:#60a5fa;margin-top:6px}
.card-prodi{display:inline-block;background:rgba(59,130,246,0.15);color:#93c5fd;padding:2px 8px;border-radius:6px;font-size:0.65rem;margin-top:4px}

/* DAY SECTION */
.day-section{padding:16px 16px 0}
.day-title{font-size:0.85rem;font-weight:700;color:#60a5fa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.day-title::after{content:'';flex:1;height:1px;background:#1e293b}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 16px;color:#475569}
.empty-icon{font-size:2.5rem;margin-bottom:8px}
.empty-text{font-size:0.85rem}

/* LOADING */
.loading{text-align:center;padding:40px;color:#64748b}
.loading-spinner{display:inline-block;width:24px;height:24px;border:3px solid #1e293b;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SHARE BUTTON */
.share-fab{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:#25d366;border:none;color:#fff;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 15px rgba(37,211,102,0.4);z-index:100;display:flex;align-items:center;justify-content:center;transition:0.2s}
.share-fab:hover{transform:scale(1.1)}

/* DARK MODE TOGGLE */
.theme-toggle{position:fixed;bottom:20px;left:20px;width:40px;height:40px;border-radius:50%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;font-size:1rem;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center}

/* LIGHT MODE */
body.light{background:#f8fafc;color:#1e293b}
body.light .header{background:linear-gradient(135deg,#2563eb,#3b82f6)}
body.light .search-input{background:#fff;border-color:#e2e8f0;color:#1e293b}
body.light .card{background:#fff;border-color:#e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
body.light .card-mk{color:#1e293b}
body.light .card-tag{background:#f1f5f9;color:#475569}
body.light .stat{background:#fff;border:1px solid #e2e8f0}
body.light .stat-label{color:#64748b}
body.light .day-title{color:#2563eb}
body.light .search-box{background:#f8fafc}
body.light .theme-toggle{background:#fff;border-color:#e2e8f0}
body.light .filter-btn{border-color:#e2e8f0;color:#64748b}
body.light .filter-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}

/* REFRESH BUTTON */
.refresh-btn{background:rgba(255,255,255,0.15);border:none;color:#93c5fd;padding:4px 10px;border-radius:12px;font-size:0.65rem;cursor:pointer;margin-left:8px}
.refresh-btn:hover{background:rgba(255,255,255,0.25)}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:4px;padding:0 16px 8px}
.view-btn{padding:6px 12px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:0.7rem;cursor:pointer;font-family:inherit}
.view-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}

/* TABLE VIEW */
.table-view{padding:0 16px 24px;overflow-x:auto}
.table-view table{width:100%;border-collapse:collapse;font-size:0.75rem}
.table-view th{background:#1e3a5f;color:#fff;padding:8px 6px;text-align:left;font-weight:600;position:sticky;top:0}
.table-view td{padding:6px;border-bottom:1px solid #1e293b;color:#e2e8f0}
.table-view tr:hover td{background:rgba(59,130,246,0.1)}
body.light .table-view th{background:#2563eb}
body.light .table-view td{border-color:#e2e8f0;color:#1e293b}
body.light .table-view tr:hover td{background:rgba(59,130,246,0.05)}

/* DETAIL MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border-radius:16px;padding:20px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;border:1px solid #334155}
body.light .modal{background:#fff;border-color:#e2e8f0}
.modal h3{font-size:1rem;color:#f1f5f9;margin-bottom:12px}
body.light .modal h3{color:#1e293b}
.modal-field{margin-bottom:8px}
.modal-label{font-size:0.65rem;color:#64748b;text-transform:uppercase;letter-spacing:0.5px}
.modal-value{font-size:0.85rem;color:#e2e8f0;margin-top:2px}
body.light .modal-value{color:#1e293b}
.modal-close{width:100%;padding:10px;border-radius:10px;background:#3b82f6;color:#fff;border:none;font-weight:600;cursor:pointer;margin-top:12px;font-family:inherit}
</style>
</head>
<body>

<div class="header">
  <h1>📅 Jadwal Dosen BINGPRO</h1>
  <p>Politeknik Pertanian Negeri Payakumbuh</p>
  <div class="badge-row">
    <span class="badge" id="dataCount">Memuat...</span>
    <span class="badge" id="sheetStatus">📊 Menghubungkan...</span>
    <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
  </div>
</div>

<div class="search-box">
  <span class="search-icon">🔍</span>
  <input type="text" class="search-input" id="searchInput" placeholder="Cari dosen, mata kuliah, ruang...">
</div>

<div class="filters" id="filterRow"></div>

<div class="view-toggle">
  <button class="view-btn active" onclick="setView('card')">📋 Kartu</button>
  <button class="view-btn" onclick="setView('table')">📊 Tabel</button>
</div>

<div class="stats" id="statsRow"></div>

<div id="content">
  <div class="loading"><div class="loading-spinner"></div><p style="margin-top:12px;font-size:0.8rem">Memuat jadwal dari Google Sheets...</p></div>
</div>

<button class="share-fab" onclick="shareWA()" title="Bagikan ke WhatsApp">📱</button>
<button class="theme-toggle" onclick="toggleTheme()" title="Ganti tema">🌙</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const SHEET_ID = '1rWnlceZUFGOVCv1pkPCwAqH8Q9ZeYxWYY_C21Ymmqqw';
const SHEET_NAME = 'Form Responses 1';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

let allData = [];
let currentFilter = 'all';
let currentView = 'card';
let searchQuery = '';

const DAY_ORDER = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];

// Parse CSV row handling quoted fields
function parseCSVRow(row) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
    else { current += ch; }
  }
  result.push(current.trim());
  return result;
}

// Parse merged header label - strip known field name, return values array
function parseMergedLabel(label, fieldName) {
  if (!label || !fieldName) return [];
  // Strip the field name prefix (case-insensitive)
  const re = new RegExp('^' + fieldName.replace(/\s+/g, '\\s+') + '\\s+', 'i');
  const rest = label.replace(re, '').trim();
  if (!rest) return [];
  return rest.split(/\s+/);
}

// Known field names in order (matching column positions)
const FIELD_NAMES = ['Timestamp', 'Nama Dosen', 'Hari', 'Jam Mengajar', 'Mata Kuliah', 'SKS', 'Prodi', 'Kelas', 'Ruang Kelas', 'Minggu Mengajar', 'Column 11'];

// Load data from Google Sheets
async function loadFromSheet() {
  try {
    const resp = await fetch(SHEET_URL);
    if (!resp.ok) throw new Error('Fetch failed: ' + resp.status);
    const csv = await resp.text();
    const rows = csv.split('\n').filter(r => r.trim());
    if (rows.length < 1) throw new Error('No data');

    const headers = parseCSVRow(rows[0]);

    // Parse the merged first batch from headers using known field names
    const timestamps = parseMergedLabel(headers[0], FIELD_NAMES[0]);
    const dosenNames = parseMergedLabel(headers[1], FIELD_NAMES[1]);
    const hariList = parseMergedLabel(headers[2], FIELD_NAMES[2]);
    const jamList = parseMergedLabel(headers[3], FIELD_NAMES[3]);
    const mkList = parseMergedLabel(headers[4], FIELD_NAMES[4]);
    const sksList = parseMergedLabel(headers[5], FIELD_NAMES[5]);
    const prodiList = parseMergedLabel(headers[6], FIELD_NAMES[6]);
    const kelasList = parseMergedLabel(headers[7], FIELD_NAMES[7]);
    const ruangList = parseMergedLabel(headers[8], FIELD_NAMES[8]);
    const mingguList = parseMergedLabel(headers[9], FIELD_NAMES[9]);

    const firstBatchCount = Math.min(
      dosenNames.length, hariList.length, jamList.length,
      mkList.length, sksList.length, prodiList.length,
      kelasList.length, ruangList.length, mingguList.length
    );

    const data = [];

    // First batch from headers
    for (let i = 0; i < firstBatchCount; i++) {
      const mk = mkList[i] || '';
      if (!mk || mk.toLowerCase() === 'mata kuliah') continue;
      data.push({
        dosen: dosenNames[i] || '',
        hari: hariList[i] || '',
        jam: jamList[i] || '',
        mk: mk,
        sks: sksList[i] || '',
        prodi: prodiList[i] || '',
        kelas: kelasList[i] || '',
        ruang: ruangList[i] || '',
        minggu: mingguList[i] || ''
      });
    }

    // Subsequent rows (individual entries)
    for (let i = 1; i < rows.length; i++) {
      const cols = parseCSVRow(rows[i]);
      if (cols.length < 5 || !cols[1]) continue;
      // Skip if MK is empty
      const mk = cols[4] || '';
      if (!mk || mk.toLowerCase() === 'mata kuliah') continue;
      data.push({
        dosen: cols[1] || '',
        hari: cols[2] || '',
        jam: cols[3] || '',
        mk: mk,
        sks: cols[5] || '',
        prodi: cols[6] || cols[10] || '',  // col 10 is Column 11 (prodi for some)
        kelas: cols[7] || '',
        ruang: cols[8] || '',
        minggu: cols[9] || ''
      });
    }

    if (data.length > 0) {
      allData = data;
      document.getElementById('sheetStatus').textContent = '📊 Live dari Google Sheets';
      console.log('Loaded ' + data.length + ' entries from Google Sheets');
      return true;
    }
  } catch(e) {
    console.log('Google Sheet error: ' + e.message);
    document.getElementById('sheetStatus').textContent = '⚠️ Gagal memuat';
  }
  return false;
}

// Render filters
function renderFilters() {
  const pros = [...new Set(allData.map(d => d.prodi).filter(Boolean))].sort();
  const dosens = [...new Set(allData.map(d => d.dosen).filter(Boolean))].sort();

  let html = '<button class="filter-btn active" onclick="setFilter(\'all\',this)">Semua</button>';

  // Prodi filters
  pros.forEach(p => {
    html += `<button class="filter-btn" onclick="setFilter('prodi:${p}',this)">📚 ${p}</button>`;
  });

  // Dosen filters
  dosens.forEach(d => {
    const short = d.split(' ').slice(0, 2).join(' ');
    html += `<button class="filter-btn" onclick="setFilter('dosen:${d}',this)">👩‍🏫 ${short}</button>`;
  });

  document.getElementById('filterRow').innerHTML = html;
}

// Render stats
function renderStats() {
  const dosenCount = new Set(allData.map(d => d.dosen)).size;
  const mkCount = new Set(allData.map(d => d.mk)).size;
  const prodiCount = new Set(allData.map(d => d.prodi)).size;
  const totalSKS = allData.reduce((sum, d) => sum + (parseInt(d.sks) || 0), 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-num">${dosenCount}</div><div class="stat-label">Dosen</div></div>
    <div class="stat"><div class="stat-num">${mkCount}</div><div class="stat-label">Mata Kuliah</div></div>
    <div class="stat"><div class="stat-num">${prodiCount}</div><div class="stat-label">Prodi</div></div>
    <div class="stat"><div class="stat-num">${totalSKS}</div><div class="stat-label">Total SKS</div></div>
  `;
}

// Filter data
function getFilteredData() {
  let filtered = allData;

  // Apply filter
  if (currentFilter.startsWith('prodi:')) {
    const p = currentFilter.split(':')[1];
    filtered = filtered.filter(d => d.prodi === p);
  } else if (currentFilter.startsWith('dosen:')) {
    const dn = currentFilter.split(':').slice(1).join(':');
    filtered = filtered.filter(d => d.dosen === dn);
  }

  // Apply search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(d =>
      (d.dosen || '').toLowerCase().includes(q) ||
      (d.mk || '').toLowerCase().includes(q) ||
      (d.ruang || '').toLowerCase().includes(q) ||
      (d.prodi || '').toLowerCase().includes(q) ||
      (d.kelas || '').toLowerCase().includes(q) ||
      (d.hari || '').toLowerCase().includes(q)
    );
  }

  return filtered;
}

// Render card view
function renderCards() {
  const filtered = getFilteredData();
  if (filtered.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Tidak ada jadwal ditemukan</div>
      </div>`;
    return;
  }

  // Group by day
  const byDay = {};
  filtered.forEach(d => {
    const day = d.hari || 'Tidak Diketahui';
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(d);
  });

  // Sort by day order
  const sortedDays = Object.keys(byDay).sort((a, b) => {
    const ia = DAY_ORDER.indexOf(a);
    const ib = DAY_ORDER.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  let html = '';
  sortedDays.forEach(day => {
    const entries = byDay[day].sort((a, b) => (a.jam || '').localeCompare(b.jam || ''));
    html += `<div class="day-section"><div class="day-title">${getDayEmoji(day)} ${day}</div></div>`;
    html += '<div class="cards">';
    entries.forEach((d, idx) => {
      html += `
        <div class="card" onclick='showDetail(${JSON.stringify(d).replace(/'/g,"&#39;")})'>
          <div class="card-header">
            <span class="card-mk">${d.mk}</span>
            <span class="card-sks">${d.sks} SKS</span>
          </div>
          <div class="card-dosen">👩‍🏫 ${d.dosen}</div>
          <div class="card-row">
            <span class="card-tag"><span class="icon">🕐</span> ${d.jam}</span>
            <span class="card-tag"><span class="icon">🏫</span> ${d.ruang || '-'}</span>
            ${d.kelas ? `<span class="card-tag"><span class="icon">👥</span> Kelas ${d.kelas}</span>` : ''}
          </div>
          ${d.prodi ? `<span class="card-prodi">${d.prodi}</span>` : ''}
          ${d.minggu ? `<span class="card-prodi" style="margin-left:4px;background:rgba(16,185,129,0.15);color:#6ee7b7">Minggu ${d.minggu}</span>` : ''}
        </div>`;
    });
    html += '</div>';
  });

  document.getElementById('content').innerHTML = html;
  document.getElementById('dataCount').textContent = `${filtered.length} jadwal`;
}

// Render table view
function renderTable() {
  const filtered = getFilteredData();
  if (filtered.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Tidak ada jadwal ditemukan</div>
      </div>`;
    return;
  }

  // Sort by day then time
  const sorted = [...filtered].sort((a, b) => {
    const da = DAY_ORDER.indexOf(a.hari);
    const db = DAY_ORDER.indexOf(b.hari);
    if (da !== db) return (da === -1 ? 99 : da) - (db === -1 ? 99 : db);
    return (a.jam || '').localeCompare(b.jam || '');
  });

  let html = '<div class="table-view"><table>';
  html += '<thead><tr><th>Hari</th><th>Jam</th><th>Mata Kuliah</th><th>SKS</th><th>Dosen</th><th>Prodi</th><th>Kelas</th><th>Ruang</th><th>Minggu</th></tr></thead><tbody>';
  sorted.forEach(d => {
    html += `<tr onclick='showDetail(${JSON.stringify(d).replace(/'/g,"&#39;")})' style="cursor:pointer">
      <td>${d.hari}</td><td>${d.jam}</td><td><strong>${d.mk}</strong></td><td>${d.sks}</td>
      <td>${d.dosen}</td><td>${d.prodi || '-'}</td><td>${d.kelas || '-'}</td>
      <td>${d.ruang || '-'}</td><td>${d.minggu || '-'}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  document.getElementById('content').innerHTML = html;
  document.getElementById('dataCount').textContent = `${filtered.length} jadwal`;
}

// Render based on current view
function render() {
  if (currentView === 'card') renderCards();
  else renderTable();
}

// Set filter
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}

// Set view
function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view-btn').forEach(b => {
    if ((view === 'card' && b.textContent.includes('Kartu')) ||
        (view === 'table' && b.textContent.includes('Tabel'))) {
      b.classList.add('active');
    }
  });
  render();
}

// Show detail modal
function showDetail(d) {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <h3>${d.mk}</h3>
    <div class="modal-field"><div class="modal-label">Dosen</div><div class="modal-value">👩‍🏫 ${d.dosen}</div></div>
    <div class="modal-field"><div class="modal-label">Hari & Jam</div><div class="modal-value">📅 ${d.hari}, ${d.jam}</div></div>
    <div class="modal-field"><div class="modal-label">SKS</div><div class="modal-value">${d.sks} SKS</div></div>
    <div class="modal-field"><div class="modal-label">Prodi</div><div class="modal-value">📚 ${d.prodi || '-'}</div></div>
    <div class="modal-field"><div class="modal-label">Kelas</div><div class="modal-value">👥 ${d.kelas || '-'}</div></div>
    <div class="modal-field"><div class="modal-label">Ruang</div><div class="modal-value">🏫 ${d.ruang || '-'}</div></div>
    <div class="modal-field"><div class="modal-label">Minggu Mengajar</div><div class="modal-value">📆 ${d.minggu || '-'}</div></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">Tutup</button>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

// Get day emoji
function getDayEmoji(day) {
  const emojis = {'Senin':'🟢','Selasa':'🔵','Rabu':'🟡','Kamis':'🟠','Jumat':'🟣','Sabtu':'🔴','Minggu':'⚪'};
  return emojis[day] || '📅';
}

// Toggle theme
function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  document.querySelector('.theme-toggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

// Share to WhatsApp
function shareWA() {
  const text = encodeURIComponent('📅 Jadwal Dosen BINGPRO — Politeknik Pertanian Negeri Payakumbuh\n\nAplikasi jadwal mengajar dosen BINGPRO.\n' + allData.length + ' jadwal tersedia.\n\n' + window.location.href);
  window.open(`https://wa.me/?text=${text}`, '_blank');
}

// Refresh data
async function refreshData() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p style="margin-top:12px;font-size:0.8rem">Memuat ulang data...</p></div>';
  await loadFromSheet();
  renderFilters();
  renderStats();
  render();
}

// Search handler
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  render();
});

// Init
async function init() {
  // Load theme
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'light') {
    document.body.classList.add('light');
    document.querySelector('.theme-toggle').textContent = '☀️';
  }

  await loadFromSheet();
  renderFilters();
  renderStats();
  render();
}

init();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.log('SW error:', e));
}
</script>
</body>
</html>
