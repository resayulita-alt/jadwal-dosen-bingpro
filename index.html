<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jadwal Dosen BINGPRO</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3a7bc8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jadwal BINGPRO">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#e8f0fa;min-height:100vh;color:#1a2332;padding-bottom:80px}

/* HEADER */
.header{background:linear-gradient(135deg,#4a80c4,#3a7bc8);padding:20px 16px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 15px rgba(58,123,200,0.3)}
.header h1{font-size:1.15rem;font-weight:800;color:#fff;margin-bottom:2px;text-shadow:0 1px 2px rgba(0,0,0,0.1)}
.header p{font-size:0.7rem;color:#c4d8f0}
.badge-row{display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,0.25);padding:3px 10px;border-radius:20px;font-size:0.6rem;color:#fff}
.header-actions{display:flex;gap:6px;justify-content:center;margin-top:8px}
.header-btn{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:#fff;font-size:0.65rem;cursor:pointer;font-family:inherit;font-weight:600;text-decoration:none;transition:0.2s}
.header-btn:hover{background:rgba(255,255,255,0.25)}

/* SEARCH */
.search-box{padding:10px 16px;position:sticky;top:120px;z-index:99;background:#e8f0fa}
.search-input{width:100%;padding:10px 14px 10px 40px;border-radius:12px;border:1px solid #b8cfe8;background:#fff;color:#1a2332;font-size:0.85rem;font-family:inherit;outline:none;transition:0.2s}
.search-input:focus{border-color:#3a7bc8;box-shadow:0 0 0 3px rgba(58,123,200,0.15)}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:0.9rem;opacity:0.5}
.search-box{position:relative}

/* FILTERS */
.filters{padding:0 16px 8px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{padding:5px 10px;border-radius:20px;border:1px solid #b8cfe8;background:#fff;color:#3d6a96;font-size:0.65rem;font-family:inherit;cursor:pointer;white-space:nowrap;transition:0.2s;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.filter-btn.active{background:#3a7bc8;border-color:#3a7bc8;color:#fff;font-weight:600}

/* STATS */
.stats{padding:6px 16px;display:flex;gap:6px;flex-wrap:wrap}
.stat{background:#fff;border-radius:10px;padding:8px 10px;flex:1;min-width:80px;text-align:center;border:1px solid #c4d8f0}
.stat-num{font-size:1.1rem;font-weight:800;color:#3a7bc8}
.stat-label{font-size:0.55rem;color:#5a8ab8;margin-top:2px}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:4px;padding:8px 16px 4px}
.view-btn{padding:5px 10px;border-radius:8px;border:1px solid #b8cfe8;background:#fff;color:#3d6a96;font-size:0.65rem;cursor:pointer;font-family:inherit}
.view-btn.active{background:#3a7bc8;border-color:#3a7bc8;color:#fff}

/* CARDS */
.cards{padding:6px 16px 16px}
.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:8px;border:1px solid #c4d8f0;transition:0.2s;box-shadow:0 2px 8px rgba(58,123,200,0.08)}
.card:hover{border-color:#3a7bc8;box-shadow:0 4px 12px rgba(58,123,200,0.15)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-mk{font-size:0.9rem;font-weight:700;color:#1a2332}
.card-sks{background:#3a7bc8;color:#fff;padding:2px 8px;border-radius:8px;font-size:0.6rem;font-weight:700}
.card-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.card-tag{background:#dce8f5;padding:3px 8px;border-radius:8px;font-size:0.65rem;color:#3d6a96;display:flex;align-items:center;gap:3px}
.card-dosen{font-size:0.75rem;font-weight:600;color:#3a7bc8;margin-top:5px}
.card-prodi{display:inline-block;background:rgba(58,123,200,0.12);color:#3a7bc8;padding:2px 8px;border-radius:6px;font-size:0.6rem;margin-top:4px}
.card-actions{display:flex;gap:4px;margin-top:8px;justify-content:flex-end}
.card-btn{padding:5px 10px;border-radius:8px;border:none;font-size:0.65rem;cursor:pointer;font-family:inherit;font-weight:600;transition:0.2s}
.card-btn-edit{background:#dbeafe;color:#2563eb}
.card-btn-edit:hover{background:#bfdbfe}
.card-btn-del{background:#fee2e2;color:#dc2626}
.card-btn-del:hover{background:#fecaca}

/* GRID VIEW */
.grid-wrap{padding:0 16px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.grid-table{width:100%;border-collapse:collapse;font-size:0.65rem;background:#fff;border-radius:10px;overflow:hidden;min-width:600px}
.grid-table th{background:#3a7bc8;color:#fff;padding:8px 6px;text-align:center;font-weight:600;position:sticky;top:0;z-index:2;white-space:nowrap}
.grid-table th:first-child{text-align:left;min-width:120px;position:sticky;left:0;z-index:3;background:#2d6aa0}
.grid-table td{padding:6px;border-bottom:1px solid #e8f0fa;border-right:1px solid #e8f0fa;text-align:center;vertical-align:top;font-size:0.6rem;min-width:100px}
.grid-table td:first-child{font-weight:700;color:#3a7bc8;text-align:left;position:sticky;left:0;background:#fff;z-index:1;white-space:nowrap;padding-left:8px;border-right:2px solid #b8cfe8}
.grid-table tr:hover td{background:rgba(58,123,200,0.04)}
.grid-table tr:hover td:first-child{background:rgba(58,123,200,0.08)}
.grid-cell-filled{background:rgba(58,123,200,0.08)!important;border-radius:6px;padding:4px!important}
.grid-cell-empty{color:#ccc;font-style:italic}
.grid-mk{font-weight:600;color:#1a2332;display:block;margin-bottom:2px}
.grid-jam{color:#5a8ab8;font-size:0.55rem}
.grid-ruang{color:#3a9d6d;font-size:0.55rem}
.grid-summary{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap}
.grid-summary-card{background:#fff;border-radius:10px;padding:10px 14px;border:1px solid #c4d8f0;flex:1;min-width:140px}
.grid-summary-title{font-size:0.65rem;color:#5a8ab8;font-weight:600;margin-bottom:4px}
.grid-summary-value{font-size:1rem;font-weight:800;color:#3a7bc8}
.grid-free-badge{display:inline-block;background:rgba(239,68,68,0.1);color:#ef4444;padding:2px 6px;border-radius:6px;font-size:0.55rem;font-weight:600}
.grid-busy-badge{display:inline-block;background:rgba(16,185,129,0.1);color:#10b981;padding:2px 6px;border-radius:6px;font-size:0.55rem;font-weight:600}

/* DAY SECTION */
.day-section{padding:12px 16px 0}
.day-title{font-size:0.8rem;font-weight:700;color:#3a7bc8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.day-title::after{content:'';flex:1;height:1px;background:#b8cfe8}

/* TABLE VIEW */
.table-wrap{padding:0 16px 16px;overflow-x:auto}
.table-wrap table{width:100%;border-collapse:collapse;font-size:0.7rem;background:#fff;border-radius:10px;overflow:hidden}
.table-wrap th{background:#3a7bc8;color:#fff;padding:7px 5px;text-align:left;font-weight:600;white-space:nowrap}
.table-wrap td{padding:5px;border-bottom:1px solid #e8f0fa;color:#1a2332}
.table-wrap tr:hover td{background:rgba(58,123,200,0.06)}

/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:#3a7bc8;border:none;color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 15px rgba(58,123,200,0.4);z-index:100;display:flex;align-items:center;justify-content:center;transition:0.2s}
.fab:hover{transform:scale(1.1);background:#2d6aa0}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:1rem;color:#1a2332;margin-bottom:16px;text-align:center}
.form-group{margin-bottom:12px}
.form-label{font-size:0.7rem;color:#5a8ab8;font-weight:600;margin-bottom:4px;display:block}
.form-input,.form-select{width:100%;padding:10px 12px;border:1px solid #b8cfe8;border-radius:10px;font-size:0.85rem;font-family:inherit;color:#1a2332;background:#fff;outline:none;transition:0.2s}
.form-input:focus,.form-select:focus{border-color:#3a7bc8;box-shadow:0 0 0 3px rgba(58,123,200,0.12)}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.form-actions{display:flex;gap:8px;margin-top:16px}
.form-btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:0.2s}
.form-btn-primary{background:#3a7bc8;color:#fff}
.form-btn-primary:hover{background:#2d6aa0}
.form-btn-secondary{background:#e8f0fa;color:#3d6a96}
.form-btn-secondary:hover{background:#dce8f5}
.form-btn-danger{background:#dc2626;color:#fff}
.form-btn-danger:hover{background:#b91c1c}

/* EMPTY */
.empty{text-align:center;padding:40px 16px;color:#5a8ab8}
.empty-icon{font-size:2.5rem;margin-bottom:8px}
.empty-text{font-size:0.85rem}

/* LOADING */
.loading{text-align:center;padding:40px;color:#5a8ab8}
.loading-spinner{display:inline-block;width:24px;height:24px;border:3px solid #c4d8f0;border-top-color:#3a7bc8;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a2332;color:#fff;padding:10px 20px;border-radius:12px;font-size:0.75rem;z-index:300;opacity:0;transition:0.3s;pointer-events:none}
.toast.show{opacity:1}

/* THEME TOGGLE */
.theme-toggle{position:fixed;bottom:20px;left:20px;width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid #b8cfe8;color:#3a7bc8;font-size:0.9rem;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.1)}

/* DARK */
body.dark{background:#0d1520;color:#c8d8ec}
body.dark .header{background:linear-gradient(135deg,#1e3a5f,#173050)}
body.dark .search-box{background:#0d1520}
body.dark .search-input{background:#15202e;border-color:#223348;color:#c8d8ec}
body.dark .card{background:#15202e;border-color:#223348;box-shadow:none}
body.dark .card-mk{color:#c8d8ec}
body.dark .card-tag{background:#1a2840;color:#6a90b8}
body.dark .card-dosen{color:#5a9ad8}
body.dark .card-prodi{background:rgba(90,154,216,0.15);color:#5a9ad8}
body.dark .stat{background:#15202e;border-color:#223348}
body.dark .stat-num{color:#5a9ad8}
body.dark .stat-label{color:#4a7a9e}
body.dark .day-title{color:#5a9ad8}
body.dark .day-title::after{background:#223348}
body.dark .filter-btn{border-color:#223348;background:transparent;color:#4a7a9e}
body.dark .filter-btn.active{background:#3a7bc8;border-color:#3a7bc8;color:#fff}
body.dark .theme-toggle{background:#15202e;border-color:#223348;color:#5a9ad8}
body.dark .view-btn{border-color:#223348;background:transparent;color:#4a7a9e}
body.dark .view-btn.active{background:#3a7bc8;color:#fff}
body.dark .grid-table{background:#1a2332}
body.dark .grid-table td{border-color:#223348;color:#c4d8f0}
body.dark .grid-table td:first-child{background:#1a2332;border-color:#223348}
body.dark .grid-cell-filled{background:rgba(58,123,200,0.15)!important}
body.dark .grid-mk{color:#e8f0fa}
body.dark .grid-summary-card{background:#1a2332;border-color:#223348}
body.dark .table-wrap th{background:#1e3a5f}
body.dark .table-wrap td{border-color:#223348;color:#c8d8ec}
body.dark .table-wrap tr:hover td{background:rgba(58,123,200,0.08)}
body.dark .modal{background:#15202e}
body.dark .modal h3{color:#c8d8ec}
body.dark .form-input,.dark .form-select{background:#1a2840;border-color:#223348;color:#c8d8ec}
body.dark .form-label{color:#5a9ad8}
body.dark .form-btn-secondary{background:#1a2840;color:#5a9ad8}
body.dark .card-btn-edit{background:#1a2840;color:#5a9ad8}
body.dark .card-btn-del{background:#2a1515;color:#f87171}
body.dark .header-btn{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.1)}
</style>
</head>
<body>

<div class="header">
  <h1>📅 Jadwal Dosen BINGPRO</h1>
  <p>Politeknik Pertanian Negeri Payakumbuh</p>
  <div class="badge-row">

      <button class="form-btn form-btn-danger" onclick="confirmDelete()">🗑️ Hapus Permanen</button>

<script>
const STORAGE_KEY = 'jadwalDosenBINGPRO';

function resetData() {
  if (!confirm('Hapus semua data lokal dan sync ulang dari Google Sheet?')) return;
  localStorage.removeItem(STORAGE_KEY);
  allData = [];
  loadFromSheet();
}
const SHEET_ID = '1rWnlceZUFGOVCv1pkPCwAqH8Q9ZeYxWYY_C21Ymmqqw';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Form+Responses+1`;

const DAY_ORDER = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];

let allData = [];
let currentFilter = 'all';
let currentView = 'card';
let searchQuery = '';
let deleteIdx = -1;

// === DATE HELPERS ===
const DAY_NAMES_SHORT = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return '';
  return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}
function formatDateWithDay(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return '';
  return `${DAY_NAMES_SHORT[d.getDay()]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}

// === STORAGE ===
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
  updateStorageInfo();
}

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      allData = JSON.parse(saved);
      if (allData.length > 0) return true;
    } catch(e) {}
  }
  return false;
}

function updateStorageInfo() {
  const el = document.getElementById('storageInfo');
  const saved = localStorage.getItem(STORAGE_KEY);
  const count = saved ? JSON.parse(saved).length : 0;
  el.textContent = `💾 ${count} tersimpan`;
}

// === CSV PARSER ===
function parseCSVRow(row) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
    else { current += ch; }
  }
  result.push(current.trim());
  return result;
}

// === LOAD FROM GOOGLE SHEETS ===
async function loadFromSheet() {
  showToast('🔄 Mengambil data dari Google Sheets...');
  try {
    const resp = await fetch(SHEET_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const csv = await resp.text();
    const rows = csv.split('\n').filter(r => r.trim());
    if (rows.length < 1) throw new Error('No data');

    const headers = parseCSVRow(rows[0]);
    const FIELD_NAMES = ['Timestamp','Nama Dosen','Hari','Jam Mengajar','Mata Kuliah','SKS','Prodi','Kelas','Ruang Kelas','Tanggal','Column 11'];

    function parseMergedLabel(label, fieldName) {
      if (!label || !fieldName) return [];
      const re = new RegExp('^' + fieldName.replace(/\s+/g, '\\s+') + '\\s+', 'i');
      const rest = label.replace(re, '').trim();
      if (!rest) return [];
      return rest.split(/\s+/);
    }

    const dosenNames = parseMergedLabel(headers[1], FIELD_NAMES[1]);
    const hariList = parseMergedLabel(headers[2], FIELD_NAMES[2]);
    const jamList = parseMergedLabel(headers[3], FIELD_NAMES[3]);
    const mkList = parseMergedLabel(headers[4], FIELD_NAMES[4]);
    const sksList = parseMergedLabel(headers[5], FIELD_NAMES[5]);
    const prodiList = parseMergedLabel(headers[6], FIELD_NAMES[6]);
    const kelasList = parseMergedLabel(headers[7], FIELD_NAMES[7]);
    const ruangList = parseMergedLabel(headers[8], FIELD_NAMES[8]);
    const tanggalList = parseMergedLabel(headers[9], FIELD_NAMES[9]);

    const count = Math.min(dosenNames.length, hariList.length, jamList.length, mkList.length, sksList.length);
    const sheetData = [];

    for (let i = 0; i < count; i++) {
      const mk = mkList[i] || '';
      if (!mk || mk.toLowerCase() === 'mata kuliah') continue;
      sheetData.push({
        dosen: dosenNames[i]||'', hari: hariList[i]||'', jam: jamList[i]||'',
        mk, sks: sksList[i]||'2', prodi: prodiList[i]||'',
        kelas: kelasList[i]||'', ruang: ruangList[i]||'', tanggal: tanggalList[i]||''
      });
    }

    for (let i = 1; i < rows.length; i++) {
      const cols = parseCSVRow(rows[i]);
      if (cols.length < 5 || !cols[1]) continue;
      const mk = cols[4] || '';
      if (!mk || mk.toLowerCase() === 'mata kuliah') continue;
      sheetData.push({
        dosen: cols[1]||'', hari: cols[2]||'', jam: cols[3]||'',
        mk, sks: cols[5]||'2', prodi: cols[6]||cols[10]||'',
        kelas: cols[7]||'', ruang: cols[8]||'', tanggal: cols[9]||''
      });
    }

    if (sheetData.length > 0) {
      // Merge: keep local entries not in sheet, add sheet entries
      const localKeys = new Set(allData.map(d => entryKey(d)));
      const sheetKeys = new Set(sheetData.map(d => entryKey(d)));
      // Keep local-only entries
      const localOnly = allData.filter(d => !sheetKeys.has(entryKey(d)));
      allData = [...sheetData, ...localOnly];
      saveData();
      showToast(`✅ ${sheetData.length} jadwal dari Sheet`);
      renderFilters();
      renderStats();
      render();
      return true;
    }
  } catch(e) {
    showToast('❌ Gagal sync: ' + e.message);
  }
  return false;
}

function entryKey(d) {
  return `${d.dosen}|${d.hari}|${d.jam}|${d.mk}`;
}

// === RENDER ===
function renderFilters() {
  const VALID_PRODI = ['BINGPRO','TPTP','TPT','HORTIKULTURA','TEKBEN','PAG','AGRIBISNIS','PP','TRK','TMP','TAP','TP','TRP','PAVET','SDT'];
  const pros = [...new Set(allData.map(d => d.prodi).filter(Boolean))].sort((a,b) => {
    const ia = VALID_PRODI.indexOf(a); const ib = VALID_PRODI.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });
  const dosens = [...new Set(allData.map(d => d.dosen).filter(Boolean))].sort();
  let html = '<button class="filter-btn active" onclick="setFilter(\'all\',this)">Semua</button>';
  pros.forEach(p => { html += `<button class="filter-btn" onclick="setFilter('prodi:${p}',this)">📚 ${p}</button>`; });
  dosens.forEach(d => { const s = d.split(' ').slice(0,2).join(' '); html += `<button class="filter-btn" onclick="setFilter('dosen:${d}',this)">👩‍🏫 ${s}</button>`; });
  document.getElementById('filterRow').innerHTML = html;
}

function renderStats() {
  const dc = new Set(allData.map(d=>d.dosen)).size;
  const mc = new Set(allData.map(d=>d.mk)).size;
  const pc = new Set(allData.map(d=>d.prodi)).size;
  const ts = allData.reduce((s,d) => s+(parseInt(d.sks)||0),0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-num">${dc}</div><div class="stat-label">Dosen</div></div>
    <div class="stat"><div class="stat-num">${mc}</div><div class="stat-label">MK</div></div>
    <div class="stat"><div class="stat-num">${pc}</div><div class="stat-label">Prodi</div></div>
    <div class="stat"><div class="stat-num">${ts}</div><div class="stat-label">SKS</div></div>`;
  document.getElementById('dataCount').textContent = `📅 ${allData.length} Jadwal`;
  updateStorageInfo();
}

function getFilteredData() {
  let f = allData;
  if (currentFilter.startsWith('prodi:')) f = f.filter(d => d.prodi === currentFilter.split(':')[1]);
  else if (currentFilter.startsWith('dosen:')) f = f.filter(d => d.dosen === currentFilter.split(':').slice(1).join(':'));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    f = f.filter(d => [d.dosen,d.mk,d.ruang,d.prodi,d.kelas,d.hari].some(v => (v||'').toLowerCase().includes(q)));
  }
  return f;
}

function getDayEmoji(day) {
  return {'Senin':'🟢','Selasa':'🔵','Rabu':'🟡','Kamis':'🟠','Jumat':'🟣','Sabtu':'🔴','Minggu':'⚪'}[day]||'📅';
}

function renderCards() {
  const filtered = getFilteredData();
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Belum ada jadwal. Klik ＋ untuk menambah.</div></div>';
    return;
  }
  const byDay = {};
  filtered.forEach(d => { const day = d.hari||'?'; if(!byDay[day]) byDay[day]=[]; byDay[day].push(d); });
  const sortedDays = Object.keys(byDay).sort((a,b) => (DAY_ORDER.indexOf(a)+1||99)-(DAY_ORDER.indexOf(b)+1||99));
  let html = '';
  sortedDays.forEach(day => {
    const entries = byDay[day].sort((a,b) => (a.jam||'').localeCompare(b.jam||''));
    const sampleT = entries[0] ? (entries[0].tanggal || entries[0].minggu) : '';
    const dateStr = formatDateWithDay(sampleT);
    const label = dateStr ? `${getDayEmoji(day)} ${day} — ${dateStr}` : `${getDayEmoji(day)} ${day}`;
    html += `<div class="day-section"><div class="day-title">${label}</div></div><div class="cards">`;
    entries.forEach(d => {
      const idx = allData.indexOf(d);
      const ed = formatDate(d.tanggal || d.minggu);
      html += `<div class="card">
        <div class="card-header"><span class="card-mk">${d.mk}</span><span class="card-sks">${d.sks} SKS</span></div>
        <div class="card-dosen">👩‍🏫 ${d.dosen}</div>
        <div class="card-row">
          <span class="card-tag">🕐 ${d.jam}</span>
          <span class="card-tag">🏫 ${d.ruang||'-'}</span>
          ${d.kelas?`<span class="card-tag">👥 ${d.kelas}</span>`:''}
          ${ed?`<span class="card-tag">📅 ${ed}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap">
          ${d.prodi?`<span class="card-prodi">${d.prodi}</span>`:''}
          ${(d.tanggal||d.minggu)?`<span class="card-prodi" style="background:rgba(16,185,129,0.12);color:#3a9d6d">📅 ${formatDate(d.tanggal || d.minggu)}</span>`:''}
          <span style="flex:1"></span>
          <button class="card-btn card-btn-edit" onclick="openEditForm(${idx})">✏️ Edit</button>
          <button class="card-btn card-btn-del" onclick="openDelete(${idx})">🗑️</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
}

function renderTable() {
  const filtered = getFilteredData();
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Belum ada jadwal</div></div>';
    return;
  }
  const sorted = [...filtered].sort((a,b) => {
    const d = (DAY_ORDER.indexOf(a.hari)+1||99)-(DAY_ORDER.indexOf(b.hari)+1||99);
    return d || (a.jam||'').localeCompare(b.jam||'');
  });
  let html = '<div class="table-wrap"><table><thead><tr><th>Hari</th><th>Tanggal</th><th>Jam</th><th>MK</th><th>SKS</th><th>Dosen</th><th>Prodi</th><th>Kelas</th><th>Ruang</th><th></th></tr></thead><tbody>';
  sorted.forEach(d => {
    const idx = allData.indexOf(d);
    const tgl = formatDateWithDay(d.tanggal || d.minggu)||'-';
    html += `<tr><td>${d.hari}</td><td>${tgl}</td><td>${d.jam}</td><td><strong>${d.mk}</strong></td><td>${d.sks}</td><td>${d.dosen}</td><td>${d.prodi||'-'}</td><td>${d.kelas||'-'}</td><td>${d.ruang||'-'}</td><td><button class="card-btn card-btn-edit" onclick="openEditForm(${idx})" style="padding:3px 6px;font-size:0.6rem">✏️</button> <button class="card-btn card-btn-del" onclick="openDelete(${idx})" style="padding:3px 6px;font-size:0.6rem">🗑️</button></td></tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('content').innerHTML = html;
}

function renderGrid() {
  const filtered = getFilteredData();
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Belum ada jadwal</div></div>';
    return;
  }
  const DAYS = ['Senin','Selasa','Rabu','Kamis','Jumat'];
  const dosens = [...new Set(filtered.map(d=>d.dosen).filter(Boolean))].sort();
  
  // Build grid data: grid[dosen][day] = [entries]
  const grid = {};
  dosens.forEach(d => { grid[d] = {}; DAYS.forEach(day => { grid[d][day] = []; }); });
  filtered.forEach(d => {
    if (d.dosen && grid[d.dosen] && d.hari && grid[d.dosen][d.hari]) {
      grid[d.dosen][d.hari].push(d);
    }
  });
  
  // Summary stats
  let totalSlots = dosens.length * DAYS.length;
  let filledSlots = 0;
  let freeSlots = 0;
  dosens.forEach(dn => {
    DAYS.forEach(day => {
      if (grid[dn][day].length > 0) filledSlots++;
      else freeSlots++;
    });
  });
  
  let html = '<div class="grid-summary">';
  html += `<div class="grid-summary-card"><div class="grid-summary-title">Total Dosen</div><div class="grid-summary-value">${dosens.length}</div></div>`;
  html += `<div class="grid-summary-card"><div class="grid-summary-title">Slot Terisi</div><div class="grid-summary-value" style="color:#10b981">${filledSlots}</div></div>`;
  html += `<div class="grid-summary-card"><div class="grid-summary-title">Slot Kosong</div><div class="grid-summary-value" style="color:#ef4444">${freeSlots}</div></div>`;
  html += `<div class="grid-summary-card"><div class="grid-summary-title">Persentase Terisi</div><div class="grid-summary-value">${totalSlots?Math.round(filledSlots/totalSlots*100):0}%</div></div>`;
  html += '</div>';
  
  html += '<div class="grid-wrap"><table class="grid-table"><thead><tr><th>Dosen</th>';
  DAYS.forEach(day => { html += `<th>${day}</th>`; });
  html += '<th>Kosong</th></tr></thead><tbody>';
  
  dosens.forEach(dn => {
    let freeDays = [];
    html += `<tr><td>${dn.split(' ').slice(0,2).join(' ')}</td>`;
    DAYS.forEach(day => {
      const entries = grid[dn][day];
      if (entries.length > 0) {
        html += '<td class="grid-cell-filled">';
        entries.forEach(e => {
          html += `<span class="grid-mk">${e.mk}</span>`;
          html += `<span class="grid-jam">${e.jam}</span>`;
          if (e.ruang) html += `<span class="grid-ruang"> ${e.ruang}</span>`;
        });
        html += '</td>';
      } else {
        html += '<td class="grid-cell-empty">-</td>';
        freeDays.push(day);
      }
    });
    // Free days summary
    if (freeDays.length > 0) {
      html += `<td><span class="grid-free-badge">${freeDays.length} hari kosong</span><br><span style="font-size:0.5rem;color:#888">${freeDays.join(', ')}</span></td>`;
    } else {
      html += '<td><span class="grid-busy-badge">Penuh</span></td>';
    }
    html += '</tr>';
  });
  
  html += '</tbody></table></div>';
  
  // Legend
  html += '<div style="padding:8px 16px;display:flex;gap:16px;font-size:0.6rem;color:#5a8ab8">';
  html += '<span>🟢 <b>Terisi</b> = Ada jadwal mengajar</span>';
  html += '<span>⚪ <b>Kosong</b> = Tidak ada jadwal (slot tersedia)</span>';
  html += '</div>';
  
  document.getElementById('content').innerHTML = html;
}

function render() { currentView==='card' ? renderCards() : currentView==='table' ? renderTable() : renderGrid(); }
function setFilter(f, btn) { currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); render(); }
function setView(v) { currentView=v; document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.view-btn').forEach(b=>{if((v==='card'&&b.textContent.includes('Kartu'))||(v==='table'&&b.textContent.includes('Tabel'))||(v==='grid'&&b.textContent.includes('Grid')))b.classList.add('active')}); render(); }

// === ADD/EDIT FORM ===
function openAddForm() {
  document.getElementById('editIndex').value = -1;
  document.getElementById('formTitle').textContent = '✏️ Tambah Jadwal';
  document.getElementById('fMK').value = '';
  document.getElementById('fSKS').value = '2';
  document.getElementById('fKelas').value = '';
  document.getElementById('fDosen').value = '';
  document.getElementById('fHari').value = 'Senin';
  document.getElementById('fJam').value = '';
  document.getElementById('fRuang').value = '';
  document.getElementById('fTanggal').value = '';
  document.getElementById('fProdi').value = '';
  updateDosenList();
  document.getElementById('formModal').classList.add('show');
}

function openEditForm(idx) {
  const d = allData[idx];
  if (!d) return;
  document.getElementById('editIndex').value = idx;
  document.getElementById('formTitle').textContent = '✏️ Edit Jadwal';
  document.getElementById('fMK').value = d.mk;
  document.getElementById('fSKS').value = d.sks;
  document.getElementById('fKelas').value = d.kelas;
  document.getElementById('fDosen').value = d.dosen;
  document.getElementById('fHari').value = d.hari;
  document.getElementById('fJam').value = d.jam;
  document.getElementById('fRuang').value = d.ruang;
  document.getElementById('fTanggal').value = d.tanggal || d.minggu || '';
  document.getElementById('fProdi').value = d.prodi;
  updateDosenList();
  document.getElementById('formModal').classList.add('show');
}

function updateDosenList() {
  const dosens = [...new Set(allData.map(d=>d.dosen).filter(Boolean))].sort();
  document.getElementById('dosenList').innerHTML = dosens.map(d=>`<option value="${d}">`).join('');
}

function closeForm() { document.getElementById('formModal').classList.remove('show'); }

function saveEntry() {
  const mk = document.getElementById('fMK').value.trim();
  const dosen = document.getElementById('fDosen').value.trim();
  const hari = document.getElementById('fHari').value;
  const jam = document.getElementById('fJam').value.trim();
  if (!mk || !dosen || !jam) { showToast('❌ Isi MK, Dosen, dan Jam!'); return; }
  const entry = {
    mk, sks: document.getElementById('fSKS').value,
    kelas: document.getElementById('fKelas').value.trim(),
    dosen, hari, jam,
    ruang: document.getElementById('fRuang').value.trim(),
    tanggal: document.getElementById('fTanggal').value,
    prodi: document.getElementById('fProdi').value
  };
  const idx = parseInt(document.getElementById('editIndex').value);
  if (idx >= 0) {
    allData[idx] = entry;
    showToast('✅ Jadwal diperbarui');
  } else {
    allData.push(entry);
    showToast('✅ Jadwal ditambahkan');
  }
  saveData();
  closeForm();
  renderFilters();
  renderStats();
  render();
}

// === DELETE ===
function openDelete(idx) {
  deleteIdx = idx;
  const d = allData[idx];
  if (!d) return;
  document.getElementById('deleteInfo').textContent = `${d.mk} — ${d.dosen}, ${d.hari} ${d.jam}`;
  document.getElementById('deleteModal').classList.add('show');
}
function closeDelete() { document.getElementById('deleteModal').classList.remove('show'); deleteIdx=-1; }
function confirmDelete() {
  if (deleteIdx >= 0 && deleteIdx < allData.length) {
    allData.splice(deleteIdx, 1);
    saveData();
    showToast('🗑️ Jadwal dihapus');
    renderFilters();
    renderStats();
    render();
  }
  closeDelete();
}

// === EXPORT/IMPORT ===
function exportData() {
  const blob = new Blob([JSON.stringify(allData, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `jadwal_bingpro_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('📤 Data di-export');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Format salah');
      allData = imported;
      saveData();
      renderFilters();
      renderStats();
      render();
      showToast(`📥 ${imported.length} jadwal di-import`);
    } catch(err) {
      showToast('❌ File tidak valid: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// === THEME ===
function toggleTheme() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('jadwalTheme', isDark ? 'dark' : 'light');
}

// === TOAST ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// === SEARCH ===
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; render(); });

// === INIT ===
async function init() {
  if (localStorage.getItem('jadwalTheme') === 'dark') {
    document.body.classList.add('dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  }
  const hasLocal = loadData();
  if (!hasLocal) {
    await loadFromSheet();
  } else {
    showToast(`💾 ${allData.length} jadwal dari penyimpanan lokal`);
  }
  renderFilters();
  renderStats();
  render();
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => {});
}
</script>
